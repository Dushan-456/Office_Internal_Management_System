<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link id="site-favicon" rel="icon" type="image/png" href="" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="title">Title</title>
  
  <script type="module">
    import { siteConfig } from './src/config/siteConfig.js';
    const faviconLink = document.getElementById('site-favicon');
    if (faviconLink) {
      faviconLink.href = siteConfig.favicon;
    }
    const title = document.getElementById('title');
    if (title) {
      title.textContent = siteConfig.name;
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
