version: '3.8'

services:
  # MongoDB Database
  db:
    image: mongo:latest
    container_name: oims-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - oims-network

  # Backend API
  backend:
    build:
      context: ./OIMS Backend
      dockerfile: Dockerfile
    container_name: oims-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./OIMS Backend/.env
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/office_management
      - FRONTEND_URL=http://localhost
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - oims-network

  # Frontend Web UI
  frontend:
    build:
      context: ./OIMS Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api/v1
        - VITE_ASSET_URL=http://localhost:5000
    container_name: oims-frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - oims-network

networks:
  oims-network:
    driver: bridge

volumes:
  mongodb_data:
